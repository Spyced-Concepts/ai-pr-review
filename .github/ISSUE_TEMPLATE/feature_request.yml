name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please check [open issues](https://github.com/Spyced-Concepts/ai-pr-review/issues) first — your idea may already be tracked.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction you're experiencing. A clear problem statement is more useful than jumping straight to a solution.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Feel free to sketch a workflow example or describe the behaviour.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New AI provider adapter
        - Review criteria / output
        - Inputs / configuration
        - Documentation
        - Security
        - Performance
        - Other
    validations:
      required: true
