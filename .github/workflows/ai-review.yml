# ReviewSentry reviews its own pull requests.
# Uses Anthropic Claude Haiku — fast and cost-efficient for self-review.
# References functional-test directly — always uses the current stable version.
# No manual pin updates needed. SHA pinning is for third-party consumers
# protecting against supply chain attacks; not applicable for a repo
# reviewing its own code with its own action.

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: reviewsentry-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - uses: Spyced-Concepts/ReviewSentry@functional-test
        with:
          ai_api_key:   ${{ secrets.AI_API_KEY }}
          ai_model:     claude-haiku-4-5-20251001
          ai_provider:  anthropic
          pr_number:    ${{ github.event.pull_request.number }}
          pr_title:     ${{ github.event.pull_request.title }}
          pr_body:      ${{ github.event.pull_request.body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
