# ReviewSentry reviews its own pull requests.
# Uses GitHub Models (GITHUB_TOKEN) — zero cost, no extra secrets required.
# Pin updated to latest functional-test SHA after each release cycle.

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: reviewsentry-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      models: read
    steps:
      - uses: Spyced-Concepts/ReviewSentry@8ff0096062c4e0859dc4c32a45efcfa31cca5d65  # functional-test post-RS-39
        with:
          ai_api_key:   ${{ secrets.GITHUB_TOKEN }}
          ai_model:     gpt-4o
          ai_provider:  github-models
          pr_number:    ${{ github.event.pull_request.number }}
          pr_title:     ${{ github.event.pull_request.title }}
          pr_body:      ${{ github.event.pull_request.body }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
