name: ReviewSentry
description: >
  Security-first AI code review. Free with GitHub Models or bring your own key.
  Sensitive-data scan first. MIT licensed.

author: Spyced Concepts Ltd. <https://spycedconcepts.co.uk>

branding:
  icon: eye
  color: purple

inputs:
  ai_api_key:
    description: API key for your AI provider. Store as a repository secret.
    required: true
  ai_model:
    description: >
      Model identifier for your AI provider.
      Examples: claude-sonnet-4-6 (Anthropic), gpt-4o (OpenAI), gemini-2.0-flash (Gemini).
    required: true
  ai_provider:
    description: >
      AI provider adapter: anthropic, openai, gemini, or github-models.
      Use github-models for zero-cost review with GITHUB_TOKEN — no extra
      account needed. Use openai for any OpenAI-compatible endpoint
      (Groq, Azure OpenAI, Mistral, Ollama) with ai_base_url.
    required: true
  ai_base_url:
    description: >
      Optional base URL override for OpenAI-compatible endpoints.
      Example: https://api.groq.com/openai for Groq.
      Leave empty to use the provider's default endpoint.
    required: false
    default: ""
  pr_number:
    description: Pull request number to review.
    required: true
  pr_title:
    description: Pull request title.
    required: true
  pr_body:
    description: Pull request description body.
    required: false
    default: ""
  diff_lines:
    description: Maximum number of diff lines to review. Default 1500.
    required: false
    default: "1500"
  review_criteria:
    description: >
      Additional review criteria to append to the standard checklist.
      Plain text, one criterion per line.
    required: false
    default: ""
  custom_rules:
    description: >
      Custom sensitive data scan rules (one per line). Applied in addition
      to built-in sensitive data checks. Use for domain-specific terms,
      product names, or internal identifiers.
    required: false
    default: ""
  system_context:
    description: >
      Optional project-specific context appended to the AI system prompt.
      Use to tell the reviewer about your stack, conventions, or constraints.
      Example: "TypeScript/React project. No class components. Tailwind CSS only."
    required: false
    default: ""
  review_drafts:
    description: >
      Whether to review draft pull requests. Default true — reviews fire on
      drafts by default. Set to false to skip review until the PR is marked
      ready for review.
      Accepted values: true/1/yes or false/0/no. Any other value triggers a
      workflow warning and defaults to true.
    required: false
    default: "true"
  github_token:
    description: GitHub token for posting the review comment.
    required: true
  fail_on:
    description: >
      When to fail the workflow based on the AI verdict.
      Accepted values: never (default) — informational only, no CI failure;
      request_changes — exit non-zero when the AI verdict is REQUEST CHANGES.
      Any other value triggers a workflow warning and defaults to never.
    required: false
    default: "never"
  show_passing_criteria:
    description: >
      Whether to include passing criteria (no issues found) in the review output.
      Default true. Set to false to show only criteria with findings, keeping
      the review concise for large PRs.
      Accepted values: true/1/yes or false/0/no. Any other value triggers a
      workflow warning and defaults to true.
    required: false
    default: "true"

outputs:
  review:
    description: The full review text posted as a PR comment.
    value: ${{ steps.review.outputs.review }}
  verdict:
    description: >
      The AI verdict extracted from the review. Possible values: APPROVE,
      APPROVE WITH NOTES, REQUEST CHANGES. Empty string if the verdict could
      not be extracted (a workflow warning is emitted in that case).
    value: ${{ steps.verdict.outputs.verdict }}

runs:
  using: composite
  steps:
    - name: Check draft PR policy
      shell: bash
      env:
        IS_DRAFT:      ${{ github.event.pull_request.draft }}
        REVIEW_DRAFTS: ${{ inputs.review_drafts }}
      run: |
        set -euo pipefail
        _raw=$(printf '%s' "$REVIEW_DRAFTS" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
        case "$_raw" in
          true|1|yes)  _review_drafts=true ;;
          false|0|no)  _review_drafts=false ;;
          *)
            echo "::warning::review_drafts has unrecognised value '${REVIEW_DRAFTS}' — accepted values: true/1/yes or false/0/no — defaulting to true"
            _review_drafts=true ;;
        esac
        if [ "$_review_drafts" = "false" ]; then
          # Default to reviewing when draft status is unavailable (fail-safe)
          _is_draft="${IS_DRAFT:-false}"
          if [ "$_is_draft" = "true" ]; then
            echo "Skipping review — pull request is a draft"
            exit 0
          fi
        fi

    - name: Fetch reviewsentry.yml config
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO:     ${{ github.repository }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        GH_ERR=$(mktemp)
        ENCODED=$(gh api "repos/$REPO/contents/.github/reviewsentry.yml?ref=$HEAD_SHA" \
          --jq '.content' 2>"$GH_ERR" || true)
        if [ -n "$ENCODED" ]; then
          B64_ERR=$(mktemp)
          CONFIG=$(printf '%s' "$ENCODED" | base64 -d 2>"$B64_ERR" || true)
          if [ -s "$B64_ERR" ]; then
            echo "::warning::Failed to decode .github/reviewsentry.yml content: $(cat "$B64_ERR") — using defaults"
            CONFIG=""
          fi
          rm -f "$B64_ERR"
        else
          ERR=$(cat "$GH_ERR" 2>/dev/null || true)
          if echo "$ERR" | grep -qi "not found\|404\|No such file"; then
            CONFIG=""  # File absent — expected, use defaults silently
          elif [ -n "$ERR" ]; then
            echo "::warning::Could not fetch .github/reviewsentry.yml: $ERR — using defaults"
            CONFIG=""
          else
            CONFIG=""
          fi
        fi
        rm -f "$GH_ERR"
        {
          echo "REVIEWSENTRY_CONFIG<<RSEOF"
          printf '%s' "${CONFIG:-}"
          echo ""
          echo "RSEOF"
        } >> "$GITHUB_ENV"

    - name: Capture PR diff
      id: diff
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail
        gh pr diff "${{ inputs.pr_number }}" --repo "$GITHUB_REPOSITORY" \
          | head -n "${{ inputs.diff_lines }}" > "$RUNNER_TEMP/pr_diff.txt" || true
        LINES=$(wc -l < "$RUNNER_TEMP/pr_diff.txt")
        if [ "${LINES:-0}" -eq 0 ]; then
          echo "::error::Diff is empty — gh pr diff may have failed or PR has no changes"
          exit 1
        fi
        echo "lines=$LINES" >> "$GITHUB_OUTPUT"

    - name: Run AI review
      id: review
      shell: bash
      env:
        AI_API_KEY:       ${{ inputs.ai_api_key }}
        AI_MODEL:         ${{ inputs.ai_model }}
        AI_PROVIDER:      ${{ inputs.ai_provider }}
        AI_BASE_URL:      ${{ inputs.ai_base_url }}
        PR_TITLE:         ${{ inputs.pr_title }}
        PR_BODY:          ${{ inputs.pr_body }}
        PR_NUMBER:        ${{ inputs.pr_number }}
        REVIEW_CRITERIA:       ${{ inputs.review_criteria }}
        CUSTOM_RULES:          ${{ inputs.custom_rules }}
        DIFF_LINES_LIMIT:      ${{ inputs.diff_lines }}
        SYSTEM_CONTEXT:        ${{ inputs.system_context }}
        REVIEWSENTRY_CONFIG:   ${{ env.REVIEWSENTRY_CONFIG }}
        SHOW_PASSING_CRITERIA: ${{ inputs.show_passing_criteria }}
      run: python3 "${{ github.action_path }}/scripts/review.py"

    - name: Post review comment
      shell: bash
      env:
        GH_TOKEN:   ${{ inputs.github_token }}
        REVIEW:     ${{ steps.review.outputs.review }}
        DIFF_LINES: ${{ steps.diff.outputs.lines }}
        DIFF_LIMIT: ${{ inputs.diff_lines }}
      run: |
        NOTE=""
        if [ "${DIFF_LINES:-0}" -ge "${DIFF_LIMIT:-1500}" ]; then
          NOTE="> Diff was large — review based on first ${DIFF_LIMIT} lines only."
        fi
        {
          echo "## AI Code Review"
          echo ""
          [ -n "$NOTE" ] && printf '%s\n\n' "$NOTE"
          printf '%s' "$REVIEW"
          echo ""
          echo ""
          echo "---"
          echo "*AI-generated advisory review. All verdicts are recommendations only — the final merge decision rests with the human maintainer.*"
        } > "$RUNNER_TEMP/review_body.md"
        gh pr comment "${{ inputs.pr_number }}" --repo "$GITHUB_REPOSITORY" --body-file "$RUNNER_TEMP/review_body.md"

    - name: Check verdict
      id: verdict
      shell: bash
      env:
        REVIEW:  ${{ steps.review.outputs.review }}
        FAIL_ON: ${{ inputs.fail_on }}
      run: |
        case "$FAIL_ON" in
          never|request_changes) ;;
          *) echo "::warning::fail_on has unrecognised value '${FAIL_ON}' — accepted values: never, request_changes — defaulting to never"
             FAIL_ON="never" ;;
        esac
        # Extraction failure always exits 0 with a warning — an incomplete review is not
        # a signal that code should not be merged. fail_on only controls whether a valid
        # REQUEST CHANGES verdict fails the workflow.
        #
        # The grep pattern matches the bold verdict format specified in scripts/review.py.
        # Alternation order is intentional: longer strings must precede shorter ones so
        # "APPROVE WITH NOTES" is not partially matched as "APPROVE".
        # Match the verdict with or without the closing ** — the AI occasionally
        # omits the trailing bold marker when output is cut off near token limit.
        VERDICT=$(printf '%s' "$REVIEW" \
          | grep -oE '\*\*AI Recommendation: (APPROVE WITH NOTES|REQUEST CHANGES|APPROVE)\*{0,2}' 2>/dev/null \
          | sed 's/\*\*AI Recommendation: //;s/\*\*$//' \
          | tail -1 || echo "")
        if [ -z "$VERDICT" ]; then
          echo "::warning::Could not extract verdict from review output — the review may be incomplete (diff too large). Reduce PR scope or increase diff_lines. Expected one of: APPROVE, APPROVE WITH NOTES, REQUEST CHANGES"
          echo "verdict=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        case "$VERDICT" in
          APPROVE|"APPROVE WITH NOTES"|"REQUEST CHANGES") ;;
          *) echo "::error::Extracted verdict '${VERDICT}' is not a recognised value — expected APPROVE, APPROVE WITH NOTES, or REQUEST CHANGES"
             exit 1 ;;
        esac
        echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
        if [ "$FAIL_ON" = "request_changes" ] && [ "$VERDICT" = "REQUEST CHANGES" ]; then
          echo "::error::AI verdict: REQUEST CHANGES — failing workflow (fail_on=request_changes)"
          exit 1
        fi
